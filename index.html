<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#14161F" />
    <meta name="description" content="Event Loop trainer: predict the console.log order for synchronous code, microtasks, and timers." />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9F%B3%3C/text%3E%3C/svg%3E" />
    <title>Event Loop Training</title>
    <script>
      const colorTheme = localStorage.getItem("event-loop-trainer:color-theme");
      if (["midnight", "ocean", "forest", "rose"].includes(colorTheme)) document.documentElement.dataset.colorTheme = colorTheme;
      const locale = localStorage.getItem("event-loop-trainer:locale");
      if (["ru", "en"].includes(locale)) document.documentElement.lang = locale;
    </script>
    <style>body { margin: 0; }</style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
